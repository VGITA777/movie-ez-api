name: movie-ez-api
services:
  db:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db-data:/var/lib/postgresql/18/docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d app -h localhost -p 5432 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    command:
      - "start-dev"
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: password
      KC_FEATURES: docker
    volumes:
      - ./keycloak.conf:/opt/keycloak/conf/keycloak.conf:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
    name: movie-ez-api-db-data
    driver: local